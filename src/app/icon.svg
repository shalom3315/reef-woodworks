<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <circle cx="16" cy="16" r="16" fill="#0d0b09"/>

  <!-- Left half — wood grain (dark) -->
  <path d="M16 2A14 14 0 0 0 16 30V2Z" fill="#2e1505"/>
  <!-- Wood grain lines -->
  <path d="M13 4 Q10 10 11 16 Q10 22 13 28" stroke="#5a3018" stroke-width="0.8" fill="none" opacity="0.7"/>
  <path d="M10 6 Q7 12 8 16 Q7 21 10 26" stroke="#5a3018" stroke-width="0.6" fill="none" opacity="0.5"/>
  <path d="M15 3 Q13 9 13.5 16 Q13 23 15 29" stroke="#5a3018" stroke-width="0.5" fill="none" opacity="0.4"/>

  <!-- Right half — saw blade (gold) -->
  <path d="M16 2A14 14 0 0 1 16 30V2Z" fill="#b07a35"/>

  <!-- Saw teeth on right edge -->
  <polygon points="16,2 22,4 20,7" fill="#c4914a"/>
  <polygon points="16,2 28,8 26,11" fill="#c4914a"/>
  <polygon points="30,16 28,10 27,14" fill="#c4914a"/>
  <polygon points="30,16 28,22 26,19" fill="#c4914a"/>
  <polygon points="16,30 28,24 26,21" fill="#c4914a"/>
  <polygon points="16,30 22,28 20,25" fill="#c4914a"/>

  <!-- Center circle -->
  <circle cx="16" cy="16" r="5.5" fill="#e2b86a"/>
  <circle cx="16" cy="16" r="2" fill="#0d0b09"/>

  <!-- Divider line -->
  <line x1="16" y1="2" x2="16" y2="30" stroke="#0d0b09" stroke-width="1.2"/>
</svg>
